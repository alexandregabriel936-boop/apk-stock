name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ✅ FIX: Python correto (NÃO usar 3.1, 3.10 é estável)
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        autoconf libtool pkg-config \
        zlib1g-dev libncurses5-dev libncursesw5-dev \
        libtinfo6 cmake libffi-dev libssl-dev

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Clean old builds
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer

    - name: Setup Android environment
      run: |
        echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "PATH=$PATH:$HOME/.buildozer/android/platform/android-sdk/platform-tools" >> $GITHUB_ENV

    - name: Accept SDK licenses (safe)
      run: |
        yes | sdkmanager --licenses || true

    - name: Install Android SDK components
      run: |
        sdkmanager "platforms;android-31"
        sdkmanager "build-tools;30.0.3"

    - name: Build APK
      run: |
        buildozer -v android debug
